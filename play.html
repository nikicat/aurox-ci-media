<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aurox screencast</title>
<link rel="stylesheet" href="player/asciinema-player.css">
<style>
  body { margin: 0; background: #16161e; color: #ddd; font: 15px/1.5 system-ui, sans-serif; }
  main { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
  a { color: #7aa2f7; }
</style>
</head>
<body>
<main>
  <h1 id="title">aurox screencast</h1>
  <div id="player"></div>
  <p><a href="./">all recordings</a> · asciinema-player, self-hosted — full timeline scrubbing, selectable text</p>
</main>
<script src="player/asciinema-player.min.js"></script>
<script>
  const cast = new URLSearchParams(location.search).get('cast') || '';
  // Same-origin relative .cast paths only — no host smuggling, no traversal.
  if (/^[A-Za-z0-9_/.-]+\.cast$/.test(cast) && !cast.includes('..') && !cast.startsWith('/')) {
    document.getElementById('title').textContent = cast;
    AsciinemaPlayer.create(cast, document.getElementById('player'),
      { fit: 'width', theme: 'dracula', idleTimeLimit: 2 });
  } else {
    document.getElementById('title').textContent =
      'no cast given — try ?cast=main/search-install.cast';
  }
</script>
</body>
</html>
